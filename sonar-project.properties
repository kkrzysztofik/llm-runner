# SonarCloud project configuration
# See: https://docs.sonarsource.com/sonarcloud/advanced-setup/ci-based-analysis/github-actions/

# =============================================================================
# REQUIRED — Set these before first push to SonarCloud
# =============================================================================
# Your SonarCloud organization key (found at https://sonarcloud.io/account/organizations)
sonar.organization=kkrzysztofik

# Your project key (create at https://sonarcloud.io/projects/create)
sonar.projectKey=kkrzysztofik_llm-runner

# =============================================================================
# Project metadata
# =============================================================================
sonar.projectName=llm-runner
sonar.projectVersion=0.1.0

# =============================================================================
# Source analysis
# =============================================================================
# src layout: sources and tests are under src/
sonar.sources=src/llama_cli,src/llama_manager
sonar.tests=src/tests
sonar.language=python
sonar.python.version=3.12

# Coverage report produced by pytest-cov (--cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Ruff generates SARIF — but SonarCloud can also import pylint-format reports.
# For now, coverage and SonarCloud's own analysis are sufficient.

# =============================================================================
# Sonar scanner behaviour
# =============================================================================
# Exclude virtual environment and build artefacts
sonar.exclusions=.venv/**,dist/**,*.egg-info/**,src/tests/**
sonar.coverage.exclusions=src/tests/**
