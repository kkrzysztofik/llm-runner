repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --unsafe-fixes]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.409
    hooks:
      - id: pyright
        additional_dependencies: [".", "gguf>=0.18.0", "httpx>=0.28.1", "loguru>=0.7.0", "psutil>=5.9.0", "pytest", "rich>=13.0.0", "textual>=6.6,<7"]

  - repo: https://github.com/pypa/pip-audit
    rev: v2.10.0
    hooks:
      - id: pip-audit
        args: [--progress-spinner, "off"]
        additional_dependencies: ["pip>=26.1", "urllib3>=2.7.0"]
