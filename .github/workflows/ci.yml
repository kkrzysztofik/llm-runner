name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent duplicate runs on the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.5.18"

permissions:
  contents: read
  # Needed for SonarCloud analysis and dependency review
  pull-requests: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Check lockfile reproducibility
        run: uv lock --check

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: pyright
        run: uv run pyright

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: pytest
        run: uv run pytest src/tests/ --cov --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: pip-audit
        run: uv run pip-audit

  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    # Skip on PRs from forks where secrets are not available
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Export requirements for Snyk Open Source scan
        run: |
          uv export --frozen --format requirements-txt --no-editable --no-dev --no-hashes --output-file .snyk-requirements.txt
          # Remove the '.' project reference that Snyk's pip parser cannot handle
          grep -v '^\.$' .snyk-requirements.txt > .snyk-requirements-clean.txt || :

      - name: Install exported dependencies for Snyk resolver
        if: env.SNYK_TOKEN != ''
        run: python -m pip install -r .snyk-requirements-clean.txt

      - name: Install Snyk CLI
        if: env.SNYK_TOKEN != ''
        run: npm install -g snyk@1.1304.0

      - name: Snyk Open Source test
        if: env.SNYK_TOKEN != ''
        run: snyk test --file=.snyk-requirements-clean.txt --package-manager=pip --severity-threshold=high --skip-unresolved=true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk Code test
        if: env.SNYK_TOKEN != ''
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Skip notice when Snyk token unavailable
        if: env.SNYK_TOKEN == ''
        run: echo "Skipping Snyk scan because SNYK_TOKEN is not configured for this run."

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    # Skip on PRs from forks where secrets are not available
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Required for accurate blame information and new-code detection
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Download coverage artifact from test job
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: .

      - name: Skip notice when Sonar token unavailable
        if: env.SONAR_TOKEN == ''
        run: echo "Skipping SonarCloud scan because SONAR_TOKEN is not configured for this run."

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarcloud-github-action@v5
        with:
          args: >
            -Dsonar.python.version=3.12
            -Dsonar.python.coverage.reportPaths=coverage.xml
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
